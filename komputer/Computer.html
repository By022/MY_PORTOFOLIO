    <script>
        const icons = [
            `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="green" class="bi bi-house-door-fill absolute -top-3 right-1/2 translate-x-1/2" viewBox="0 0 16 16"><path d="M6.5 14.5v-3.505c0-.245.25-.495.5-.495h2c.25 0 .5.25.5.5v3.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5" /></svg>`,
            `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="green" class="bi bi-file-person-fill absolute -top-3 right-1/2 translate-x-1/2" viewBox="0 0 16 16"><path d="M12 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2m-1 7a3 3 0 1 1-6 0 3 3 0 0 1 6 0m-3 4c2.623 0 4.146.826 5 1.755V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-1.245C3.854 11.825 5.377 11 8 11"/></svg>`,
            `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="green" class="bi bi-person-lines-fill absolute -top-3 right-1/2 translate-x-1/2" viewBox="0 0 16 16"><path d="M6 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5 6s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zM11 3.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 1-.5-.5m.5 2.5a.5.5 0 0 0 0 1h4a.5.5 0 0 0 0-1zm2 3a.5.5 0 0 0 0 1h2a.5.5 0 0 0 0-1zm0 3a.5.5 0 0 0 0 1h2a.5.5 0 0 0 0-1z"/></svg>`
        ];

        const imageElement = document.getElementById('image');
        const allLi = document.querySelectorAll('ul li');

        // Perbaikan Navigasi
        allLi.forEach((element, index) => {
            element.addEventListener('click', function () {
                // 1. Reset semua state (hapus class dan bersihkan semua span)
                allLi.forEach(li => {
                    li.classList.remove('border-b-2', 'border-green-300', 'text-black', 'relative');
                    li.querySelector('span').innerHTML = '';
                });

                // 2. Set state aktif pada elemen yang diklik
                element.classList.add('border-b-2', 'border-green-300', 'text-black', 'relative');

                // 3. Masukkan icon ke dalam span milik elemen yang diklik
                const targetSpan = element.querySelector('span');
                targetSpan.innerHTML = icons[index];
            });
        });

        // Perbaikan Slider Gambar
        fetch('https://api.pexels.com/v1/search?query=computer', {
            method: 'GET',
            headers: {
                'Authorization': 'm9cDlvz45mxw3YzFli0cSCBj0TQ9847XPBpqZSht60WB2EnwOqPhX4Gp'
            }
        })
            .then(response => response.json())
            .then(data => {
                const photos = data.photos;
                if (photos.length === 0) return;

                // Set gambar awal
                imageElement.style.backgroundImage = `url('${photos[0].src.large}')`;

                setInterval(() => {
                    const randomIndex = Math.floor(Math.random() * photos.length);
                    const newImgUrl = photos[randomIndex].src.large;

                    // Update background
                    imageElement.style.backgroundImage = `url('${newImgUrl}')`;
                }, 10000);
            })
            .catch(err => console.error("Error:", err));

        // })
        //         imageElement.src = element.download_url;
        //         console.log('Element:', element);
        //     });
        //     console.log('Response:', data);
        //     console.log("element:", imageElement);
        // })
        // .catch(error => {
        //     console.error('Error fetching image:', error);
        // });
        // const numbers = Array.from({ length: 20 }, (_, i) => i + 1);

        // numbers
        //     .sort(() => Math.random() - 0.5)
        //     .forEach(num => console.log(num));
    </script>
